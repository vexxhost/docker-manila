name: build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - stable/**

permissions:
  contents: read

jobs:
  tox:
    name: tox (${{ matrix.project.repository }})
    uses: vexxhost/docker-atmosphere/.github/workflows/tox.yml@2bed598442494c60f1f9ae004626473f7c400bf7 # main
    strategy:
      fail-fast: false
      matrix:
        project:
          - repository: openstack/manila
            ref: 75f247b92eb4fd269a52483e65274ecf1c1fa0f5 # master
    with:
      repository: ${{ matrix.project.repository }}
      ref: ${{ matrix.project.ref }}

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@f9beb2976a2cbd2b83f7d49b2a1fcbf718205314 # main
        with:
          repository: openstack/manila
          ref: 75f247b92eb4fd269a52483e65274ecf1c1fa0f5 # master

      - uses: vexxhost/docker-atmosphere/.github/actions/build-image@f9beb2976a2cbd2b83f7d49b2a1fcbf718205314 # main
        with:
          image-name: manila
          build-contexts: manila=openstack/manila
          push: ${{ github.event_name != 'pull_request' }}
